services:
  - type: web
    name: quizlive
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: PUBLIC_BASE_URL
        sync: false
    disk:
      name: quizlive-data
      mountPath: /var/data
      sizeGB: 1
